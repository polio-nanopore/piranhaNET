name: Piranha Apps
on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'piranha-apps/**'
      - '.github/workflows/**'

defaults:
  run:
    working-directory: ./piranha-apps
jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.9
          cache: npm
          cache-dependency-path: piranha-apps/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format:check
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.9
          cache: npm
          cache-dependency-path: piranha-apps/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build-electron
      - name: Unit and integration test
        run: npm run coverage
      # TODO: add this when codecov token is available
      #- name: Upload coverage
      #  uses: codecov/codecov-action@v5
