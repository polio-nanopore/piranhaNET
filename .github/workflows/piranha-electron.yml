name: Piranha Electron
on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'piranha-apps/**'
      - './github/workflows/**'

defaults:
  run:
    working-directory: ./piranha-apps

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.9
          cache: npm
          cache-dependency-path: piranha-apps/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: E2e test
        run: npm run test:e2e